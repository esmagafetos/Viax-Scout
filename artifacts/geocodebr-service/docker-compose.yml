version: "3.9"

services:
  geocodebr:
    build: .
    image: viax-geocodebr
    container_name: viax-geocodebr
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - geocodebr-cache:/root/.cache
    environment:
      - GEOCODEBR_PORT=8002
    healthcheck:
      test: ["CMD", "Rscript", "-e", "readLines('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  geocodebr-cache:
    driver: local
